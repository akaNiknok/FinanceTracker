<style>
/* ── Design tokens ───────────────────────────────────────────────────────────
 * Quiet dark fintech theme. Data is the only loud thing on the page: marks use
 * --chart-* (validated: ΔE 80+ adjacent, ≥3:1 on --surface), text stays in the
 * ink tokens, status colors are reserved for status. */
:root{
  --bg:#0d0f14; --surface:#151821; --surface-2:#1d212c; --surface-3:#262b38;
  --border:#232834; --border-2:#343b4b;
  --text:#e9ecf2; --text-dim:#9aa3b4; --text-faint:#6d768a;
  --accent:#5b8cff; --accent-2:#84a8ff;
  --pos:#3ecf8e; --neg:#ff7373; --warn:#ffb454;
  --chart-spend:#5b8cff; --chart-income:#27ad75; --chart-neg:#d95757;
  --grid-line:#232834;
  --shadow:0 8px 28px rgba(0,0,0,.32);
  --shadow-sm:0 2px 10px rgba(0,0,0,.22);
  --radius:16px; --radius-sm:11px;
  --nav-w:216px;
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:8px}
::-webkit-scrollbar-track{background:transparent}
::selection{background:rgba(91,140,255,.35)}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

#app{min-height:100vh;display:grid;grid-template-columns:minmax(0,1fr);grid-template-rows:auto 1fr auto;grid-template-areas:"topbar" "main" "nav"}

/* ── Top bar ─────────────────────────────────────────────────────────────── */
.topbar{grid-area:topbar;display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;background:rgba(13,15,20,.86);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:.2px}
.brand-dot{width:11px;height:11px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--pos));box-shadow:0 0 10px rgba(91,140,255,.55)}
.brand-name{font-size:15.5px}
.topbar-right{display:flex;align-items:center;gap:8px}
.month-picker{background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:8px 12px;font-size:13px;font-weight:600;outline:none;min-height:38px}
.icon-btn{background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);
  width:38px;height:38px;font-size:17px;display:grid;place-items:center;transition:background .15s,transform .1s}
.icon-btn:hover{background:var(--surface-3)}
.icon-btn:active{transform:scale(.94)}
.icon-btn.spin{animation:spin .8s linear infinite}

/* ── Nav (bottom on mobile, sidebar on desktop) ──────────────────────────── */
.nav{grid-area:nav;display:flex;justify-content:space-around;background:rgba(13,15,20,.92);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-top:1px solid var(--border);position:sticky;bottom:0;z-index:20;padding:6px 6px calc(6px + env(safe-area-inset-bottom))}
.nav-item{background:none;border:none;color:var(--text-faint);display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:7px 6px;border-radius:12px;font-size:10.5px;font-weight:600;transition:color .15s,background .15s;flex:1;min-width:0;min-height:48px}
.nav-item .nav-ico{font-size:18px;line-height:1}
.nav-item .nav-label{max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item.active{color:var(--accent-2)}
.nav-item:active{transform:scale(.95)}
.nav-item:hover{color:var(--text)}
/* On phone only 4 primary tabs + More; secondary screens live in the sheet. */
.nav-item.secondary{display:none}
.nav-item.nav-more{display:flex}

/* ── More sheet (mobile) ─────────────────────────────────────────────────── */
.sheet-root{position:fixed;inset:0;z-index:55}
.sheet-root[hidden]{display:none}
.sheet-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(2px)}
.sheet{position:absolute;left:0;right:0;bottom:0;background:var(--surface);border:1px solid var(--border-2);border-bottom:none;
  border-radius:20px 20px 0 0;padding:10px 14px calc(18px + env(safe-area-inset-bottom));box-shadow:var(--shadow);animation:sheetUp .22s ease}
.sheet-grab{width:38px;height:4px;border-radius:2px;background:var(--border-2);margin:2px auto 12px}
.sheet-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.sheet-item{background:var(--surface-2);border:1px solid var(--border);border-radius:14px;color:var(--text-dim);
  display:flex;flex-direction:column;align-items:center;gap:6px;padding:14px 4px;font-size:11.5px;font-weight:600;min-height:64px}
.sheet-item .nav-ico{font-size:20px;line-height:1}
.sheet-item.active{color:var(--accent-2);border-color:rgba(91,140,255,.45);background:rgba(91,140,255,.08)}
.sheet-item:active{transform:scale(.96)}
@keyframes sheetUp{from{transform:translateY(30px);opacity:.4}to{transform:none;opacity:1}}

/* ── Main ────────────────────────────────────────────────────────────────── */
.main{grid-area:main;padding:16px;max-width:1080px;width:100%;margin:0 auto;min-width:0}
.screen{animation:fade .25s ease}
.screen-title{font-size:21px;font-weight:750;letter-spacing:-.2px;margin:2px 0 4px}
.screen-sub{color:var(--text-dim);font-size:13px;margin:0 0 16px}

/* ── Cards / grid ────────────────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px;box-shadow:var(--shadow-sm)}
.card-h{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text-faint);margin:0 0 14px}
/* top-level hero tiles / KPI grids need the same rhythm as .card (which
 * carries its own margin-bottom) — otherwise they sit flush against neighbors */
.screen>.stat,.screen>.grid{margin-bottom:14px}
.grid{display:grid;gap:12px}
.grid-2{grid-template-columns:repeat(2,1fr)}
.grid-3{grid-template-columns:repeat(3,1fr)}
.grid-auto{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}

/* ── Stat tiles / hero ───────────────────────────────────────────────────── */
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:15px 17px;box-shadow:var(--shadow-sm);min-width:0}
.stat-label{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-faint);font-weight:650}
.stat-value{font-size:22px;font-weight:750;margin-top:5px;letter-spacing:-.4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stat-sub{font-size:12px;color:var(--text-dim);margin-top:3px}
.stat-spark{margin-top:10px;display:block;width:120px;max-width:100%;height:28px}
.hero{background:radial-gradient(130% 170% at 0% 0%,rgba(91,140,255,.16),transparent 55%),
  linear-gradient(150deg,#1a2030,#151821 60%);border:1px solid var(--border-2)}
.hero .stat-value{font-size:clamp(30px,7vw,42px);line-height:1.12;margin-top:7px}
.delta{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:650;border-radius:999px;padding:2px 9px;white-space:nowrap;max-width:100%}
.delta.up{background:rgba(62,207,142,.13);color:var(--pos)}
.delta.down{background:rgba(255,115,115,.13);color:var(--neg)}
.delta.flat{background:var(--surface-3);color:var(--text-dim)}

/* Asset vs liability split bar (hero) — 2px surface gap between fills */
.split-bar{display:flex;gap:2px;height:8px;margin:16px 0 8px}
.split-bar>div{border-radius:4px;min-width:6px}
.split-a{background:var(--chart-income)}
.split-l{background:var(--chart-neg)}
.split-legend{display:flex;gap:18px;font-size:12.5px;color:var(--text-dim);flex-wrap:wrap}
.split-legend b{color:var(--text);font-weight:650}
.lg-key{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:6px;vertical-align:baseline}

/* ── Misc text ───────────────────────────────────────────────────────────── */
.pos{color:var(--pos)} .neg{color:var(--neg)} .warn{color:var(--warn)} .dim{color:var(--text-dim)} .faint{color:var(--text-faint)}
.mono{font-variant-numeric:tabular-nums}
.row-between{display:flex;align-items:center;justify-content:space-between;gap:10px}
.pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:600;background:var(--surface-3);color:var(--text-dim)}
.pill.pos{background:rgba(62,207,142,.14);color:var(--pos)}
.pill.neg{background:rgba(255,115,115,.14);color:var(--neg)}
.pill.warn{background:rgba(255,180,84,.14);color:var(--warn)}

/* ── Charts (inline SVG) ─────────────────────────────────────────────────── */
.chart-wrap{position:relative}
.chart-svg{display:block;width:100%;height:auto;overflow:visible}
.chart-svg text{font-family:var(--font);fill:var(--text-faint);font-size:10.5px}
.chart-legend{display:flex;gap:16px;font-size:12px;color:var(--text-dim);align-items:center;flex-wrap:wrap;margin-bottom:12px}
.chart-legend .lg{display:inline-flex;align-items:center;gap:6px}
.chart-tip{position:absolute;pointer-events:none;background:var(--surface-3);border:1px solid var(--border-2);border-radius:9px;
  padding:7px 10px;font-size:12px;line-height:1.5;box-shadow:var(--shadow);z-index:6;white-space:nowrap;transform:translate(-50%,calc(-100% - 8px))}
.chart-tip b{font-weight:700}
.chart-tip[hidden]{display:none}

/* Horizontal category bars (spend by segment) — one series, one hue */
.hbar{display:grid;grid-template-columns:minmax(84px,126px) minmax(0,1fr) auto;gap:12px;align-items:center;padding:6px 0}
.hbar-lab{font-size:13px;color:var(--text-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-track{height:12px;border-radius:0 4px 4px 0}
.hbar-fill{height:100%;background:var(--chart-spend);border-radius:0 4px 4px 0;min-width:2px;transition:width .4s ease}
.hbar-val{font-size:12.5px;font-variant-numeric:tabular-nums;color:var(--text);text-align:right}

/* ── Meters (budgets / utilization): track = lighter step of the same ramp ── */
.meter{position:relative;height:10px;border-radius:6px;background:rgba(91,140,255,.15);margin-top:9px}
.meter.warn{background:rgba(255,180,84,.14)}
.meter.over{background:rgba(255,115,115,.14)}
.meter-fill{position:absolute;left:0;top:0;bottom:0;border-radius:6px;background:var(--accent);transition:width .4s ease;min-width:2px}
.meter.warn .meter-fill{background:var(--warn)}
.meter.over .meter-fill{background:var(--chart-neg)}
.meter.thin{height:6px;margin-top:7px}
/* pace notch: where spending "should" be, given how much of the period elapsed */
.meter-pace{position:absolute;top:-4px;bottom:-4px;width:2px;border-radius:1px;background:var(--text-dim);opacity:.9}
.meter-pace::after{content:"";position:absolute;left:-3px;top:-4px;border:4px solid transparent;border-top-color:var(--text-dim)}

/* legacy thin bar (credit utilization etc.) */
.bar{height:8px;border-radius:6px;background:var(--surface-3);overflow:hidden;margin-top:8px}
.bar.thin{height:5px;margin-top:6px}
.bar-fill{height:100%;border-radius:6px;background:var(--accent);transition:width .4s ease}
.bar-fill.over{background:var(--chart-neg)}
.bar-fill.warn{background:var(--warn)}

/* ── Lists / rows ────────────────────────────────────────────────────────── */
.list{display:flex;flex-direction:column}
.list-date{display:flex;justify-content:space-between;align-items:baseline;gap:10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text-faint);
  padding:16px 4px 6px;border-bottom:1px solid var(--border)}
.list-date:first-child{padding-top:2px}
.list-date .ld-sum{font-variant-numeric:tabular-nums;letter-spacing:0;text-transform:none;font-weight:600}
.litem{display:flex;align-items:center;gap:12px;padding:11px 4px;border-bottom:1px solid var(--border)}
.litem:last-child{border-bottom:none}
.litem .ic{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;font-size:16px;flex:none;
  background:var(--surface-3);color:var(--text-dim)}
.litem .ic.in{background:rgba(62,207,142,.13);color:var(--pos)}
.litem .ic.out{background:rgba(255,115,115,.12);color:var(--neg)}
.litem .ic.xfer{background:rgba(91,140,255,.13);color:var(--accent-2)}
.litem .grow{flex:1;min-width:0}
.litem .t1{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.litem .t2{font-size:12px;color:var(--text-faint);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.litem .amt{font-weight:700;white-space:nowrap;font-variant-numeric:tabular-nums}
.litem .amt .amt-sub{display:block;font-weight:500;font-size:11px;color:var(--text-faint);text-align:right}
.litem.click{cursor:pointer;border-radius:12px}
.litem.click:hover{background:var(--surface-2)}
/* in-flight (optimistic) row: dimmed with a spinner in the icon slot */
.litem.pending{opacity:.6;animation:pendPulse 1.4s ease-in-out infinite}
.mini-spin{width:16px;height:16px;border:2px solid var(--border-2);border-top-color:var(--accent);border-radius:50%;display:inline-block;animation:spin .8s linear infinite}
@keyframes pendPulse{0%,100%{opacity:.6}50%{opacity:.4}}

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn{background:var(--surface-2);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:9px 15px;font-size:14px;font-weight:600;transition:background .15s,transform .1s;min-height:38px}
.btn:hover{background:var(--surface-3)}
.btn:active{transform:scale(.97)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#0b1020}
.btn.primary:hover{background:var(--accent-2)}
.btn.danger{color:var(--neg);border-color:rgba(255,115,115,.4)}
.btn.danger:hover{background:rgba(255,115,115,.1)}
.btn.sm{padding:6px 11px;font-size:12.5px;min-height:32px}
.btn.ghost{background:none;border-color:transparent}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}

/* ── Filters ─────────────────────────────────────────────────────────────── */
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.filters input,.filters select{background:var(--surface-2);color:var(--text);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:9px 11px;font-size:13px;outline:none;min-width:0;min-height:38px}
.filters input:focus,.filters select:focus{border-color:var(--accent)}
.filters .search{flex:1;min-width:140px}

/* ── Forms / modal ───────────────────────────────────────────────────────── */
.modal-root{position:fixed;inset:0;z-index:50;display:grid;place-items:center;padding:16px}
.modal-root[hidden]{display:none}
.modal-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(3px)}
.modal-card{position:relative;background:var(--surface);border:1px solid var(--border-2);border-radius:18px;
  width:100%;max-width:460px;max-height:90vh;overflow:auto;box-shadow:var(--shadow);animation:pop .2s ease}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--border)}
.modal-h h3{margin:0;font-size:16px}
.modal-b{padding:18px}
.modal-f{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--surface-2);color:var(--text);
  border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-size:14px;outline:none;font-family:inherit;min-height:40px}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field .hint{font-size:11px;color:var(--text-faint);margin-top:4px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.seg-toggle{display:flex;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:3px;margin-bottom:14px}
.seg-toggle button{flex:1;background:none;border:none;color:var(--text-dim);padding:8px;border-radius:8px;font-weight:600;font-size:13px}
.seg-toggle button.on{background:var(--accent);color:#0b1020}

/* ── Combobox (fuzzy picker, replaces <select>) ──────────────────────────── */
.combo{position:relative}
.combo-input{width:100%}
.filters .combo{flex:1;min-width:130px}
.combo-list{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:70;max-height:240px;overflow:auto;
  background:var(--surface-2);border:1px solid var(--border-2);border-radius:var(--radius-sm);box-shadow:var(--shadow);padding:4px}
.combo-opt{padding:9px 10px;border-radius:8px;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:8px}
.combo-opt .combo-lab{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.combo-opt.active{background:var(--surface-3)}
.combo-opt.sel{color:var(--accent-2)}
.combo-empty{padding:8px 10px;color:var(--text-faint);font-size:13px}

/* small colored dot used to identify accounts across screens */
.acct-dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle;margin-right:5px;flex:none}

/* ── Color picker (account color-coding) ─────────────────────────────────── */
.color-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.color-row input[type=color]{width:46px;height:38px;padding:2px;border:1px solid var(--border);
  border-radius:var(--radius-sm);background:var(--surface-2);cursor:pointer;flex:none}
.swatches{display:flex;gap:7px;flex-wrap:wrap}
.swatch{width:24px;height:24px;border-radius:50%;border:2px solid var(--border);padding:0;cursor:pointer;transition:.12s}
.swatch.none{background:var(--surface-2);color:var(--text-faint);font-size:11px;display:grid;place-items:center;border-style:dashed}
.swatch.on{box-shadow:0 0 0 2px var(--surface),0 0 0 4px var(--accent);border-color:transparent}
.swatch:hover{transform:scale(1.12)}

/* ── FAB ─────────────────────────────────────────────────────────────────── */
.fab{position:fixed;right:18px;bottom:calc(84px + env(safe-area-inset-bottom));width:56px;height:56px;border-radius:18px;border:none;z-index:30;
  background:var(--accent);color:#0b1020;font-size:28px;font-weight:400;line-height:1;box-shadow:0 8px 24px rgba(91,140,255,.35);transition:.15s}
.fab:hover{background:var(--accent-2);transform:translateY(-2px)}
.fab:active{transform:scale(.94)}

/* ── Toast ───────────────────────────────────────────────────────────────── */
.toast-root{position:fixed;left:0;right:0;bottom:96px;z-index:60;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none}
.toast{background:var(--surface-3);border:1px solid var(--border-2);color:var(--text);padding:10px 16px;border-radius:999px;
  font-size:13px;font-weight:600;box-shadow:var(--shadow);animation:pop .2s ease}
.toast.ok{border-color:rgba(62,207,142,.5)} .toast.err{border-color:rgba(255,115,115,.5)}

/* ── Table (Tax / wide lists) ────────────────────────────────────────────── */
.tbl-wrap{overflow:auto;max-height:72vh}
table.tbl{width:100%;border-collapse:collapse;font-size:13px}
table.tbl th{text-align:left;color:var(--text-faint);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.4px;
  padding:8px 10px;border-bottom:1px solid var(--border);white-space:nowrap;
  position:sticky;top:0;background:var(--surface);z-index:1}
table.tbl td{padding:9px 10px;border-bottom:1px solid var(--border);white-space:nowrap;font-variant-numeric:tabular-nums}
table.tbl tr:hover td{background:var(--surface-2)}
table.tbl td.ed-cell{cursor:pointer}
table.tbl td.ed-cell:hover{background:var(--surface-3);box-shadow:inset 0 0 0 1px var(--accent)}
table.tbl td.ck-cell{text-align:center}
/* Inline editor fills the cell; td padding drops to 0 so the row height/width
 * doesn't jump when the input (which carries the same padding) takes over. */
table.tbl td.editing{padding:0}
.ledger-edit-input{display:block;box-sizing:border-box;width:100%;margin:0;padding:9px 10px;
  font:inherit;color:var(--text);background:var(--surface-3);border:0;
  box-shadow:inset 0 0 0 1px var(--accent);border-radius:0;outline:none}
.tax-head{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.ck-row{display:flex;align-items:center;gap:10px;margin:14px 0;font-size:14px;cursor:pointer}

/* ── Loaders / empty ─────────────────────────────────────────────────────── */
.boot-loader{display:grid;place-items:center;gap:14px;padding:80px 0;color:var(--text-dim)}
.spinner{width:34px;height:34px;border:3px solid var(--border-2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.empty{text-align:center;color:var(--text-faint);padding:34px 14px;font-size:14px}
.empty .empty-ico{display:block;font-size:26px;margin-bottom:8px;opacity:.7}
.skeleton{background:linear-gradient(90deg,var(--surface-2),var(--surface-3),var(--surface-2));background-size:200% 100%;
  animation:shimmer 1.2s infinite;border-radius:8px;height:14px}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
